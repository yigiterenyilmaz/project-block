<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>project_block — Rarity Grader</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a3038;
    --ink:#e6edf3; --muted:#8b98a5; --faint:#5c6773;
    --common:#3b82f6; --rare:#ef4444; --legend:#eab308;
    --common-dim:#16324f; --rare-dim:#4a1d1d; --legend-dim:#463a10;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  a{color:var(--common)}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#0e1116,#0e1116f2);
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px)}
  .bar{max-width:1000px;margin:0 auto;padding:14px 18px;display:flex;
    gap:14px;align-items:center;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
  h1 small{color:var(--faint);font-weight:400}
  .grow{flex:1}
  .btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:7px 12px;cursor:pointer;font-size:13px}
  .btn:hover{border-color:#3d4652}
  .btn.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
  .progress{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
  .track{width:160px;height:8px;background:var(--panel2);border-radius:99px;overflow:hidden}
  .track > i{display:block;height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);width:0}
  .counts{display:flex;gap:6px}
  .pill{font-size:12px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);
    display:inline-flex;gap:6px;align-items:center;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:99px;display:inline-block}
  .dot.c{background:var(--common)} .dot.r{background:var(--rare)} .dot.l{background:var(--legend)}

  .tools{max-width:1000px;margin:0 auto;padding:12px 18px 0;display:flex;gap:10px;
    align-items:center;flex-wrap:wrap}
  input[type=search]{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--line);
    color:var(--ink);border-radius:7px;padding:8px 11px;font-size:13px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--muted);border:0;padding:7px 11px;
    cursor:pointer;font-size:12.5px;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:0}
  .seg button.on{background:var(--panel2);color:var(--ink)}

  main{max-width:1000px;margin:0 auto;padding:14px 18px 120px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:14px 16px;margin:10px 0;display:grid;grid-template-columns:1fr auto;
    gap:12px 16px;scroll-margin-top:150px}
  .card.active{border-color:#4b586a;box-shadow:0 0 0 2px #ffffff14}
  .card.g-common{border-left:4px solid var(--common)}
  .card.g-rare{border-left:4px solid var(--rare)}
  .card.g-legendary{border-left:4px solid var(--legend)}
  .head{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap}
  .name{font-size:15.5px;font-weight:640}
  .kind{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);
    border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .kind.power{color:#c9a3ff;border-color:#3a2f52}
  .did{font-size:11.5px;color:var(--faint);font-family:ui-monospace,Menlo,Consolas,monospace}
  .sell{font-size:11.5px;color:var(--faint)}
  .locknote{font-size:11px;color:var(--legend);opacity:.8}
  .desc{margin:8px 0 0;color:var(--ink)}
  .desc .tr{display:block;color:var(--muted);margin-top:5px;font-size:13px}
  .desc.hide-tr .tr{display:none}
  .desc.hide-en .en{display:none}
  .rate{display:flex;flex-direction:column;gap:7px;align-self:center;min-width:132px}
  .rate button{display:flex;justify-content:space-between;align-items:center;gap:8px;
    background:var(--panel2);border:1px solid var(--line);color:var(--muted);
    border-radius:8px;padding:8px 11px;cursor:pointer;font-size:13px;font-weight:560}
  .rate button kbd{font-size:10.5px;color:var(--faint);border:1px solid var(--line);
    border-radius:4px;padding:0 5px;background:#0d1117}
  .rate button.common.sel{background:var(--common-dim);border-color:var(--common);color:#cfe0ff}
  .rate button.rare.sel{background:var(--rare-dim);border-color:var(--rare);color:#ffd9d9}
  .rate button.legendary.sel{background:var(--legend-dim);border-color:var(--legend);color:#ffeeb0}
  .rate button:hover{border-color:#46505d}

  .empty{color:var(--muted);text-align:center;padding:40px}

  /* modal */
  .scrim{position:fixed;inset:0;background:#000a;display:none;z-index:20;
    align-items:center;justify-content:center;padding:20px}
  .scrim.on{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    width:min(680px,100%);max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal h2{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px}
  .modal .body{padding:16px 18px;overflow:auto}
  .modal textarea{width:100%;height:280px;background:#0d1117;color:var(--ink);
    border:1px solid var(--line);border-radius:8px;padding:10px;font-size:12px;
    font-family:ui-monospace,Menlo,Consolas,monospace;resize:vertical}
  .modal .foot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;
    justify-content:flex-end;flex-wrap:wrap}
  .hint{color:var(--muted);font-size:12.5px;margin:0 0 10px}
  .footer-help{position:fixed;bottom:0;left:0;right:0;background:#0e1116e8;
    border-top:1px solid var(--line);color:var(--faint);font-size:12px;text-align:center;
    padding:7px;backdrop-filter:blur(4px)}
  kbd{font-family:ui-monospace,monospace}
</style>
</head>
<body>
<header>
  <div class="bar">
    <h1>Rarity Grader <small>· project_block</small></h1>
    <div class="grow"></div>
    <div class="progress">
      <span id="progText">0 / 0</span>
      <span class="track"><i id="progFill"></i></span>
    </div>
    <div class="counts">
      <span class="pill"><span class="dot c"></span><span id="cCommon">0</span></span>
      <span class="pill"><span class="dot r"></span><span id="cRare">0</span></span>
      <span class="pill"><span class="dot l"></span><span id="cLegend">0</span></span>
    </div>
    <button class="btn" id="btnImport">Import</button>
    <button class="btn" id="btnReset">Reset</button>
    <button class="btn primary" id="btnExport">Export</button>
  </div>
  <div class="tools">
    <input id="search" type="search" placeholder="Search name, id or description…" autocomplete="off">
    <div class="seg" id="segKind">
      <button data-k="all" class="on">All</button>
      <button data-k="joker">Jokers</button>
      <button data-k="power">Powers</button>
    </div>
    <div class="seg" id="segState">
      <button data-s="all" class="on">Any</button>
      <button data-s="ungraded">Ungraded</button>
      <button data-s="graded">Graded</button>
    </div>
    <div class="seg" id="segLang">
      <button data-l="both" class="on">EN+TR</button>
      <button data-l="en">EN</button>
      <button data-l="tr">TR</button>
    </div>
  </div>
</header>

<main id="list"></main>

<div class="footer-help">
  <kbd>↑</kbd>/<kbd>↓</kbd> or <kbd>J</kbd>/<kbd>K</kbd> move · <kbd>1</kbd> common · <kbd>2</kbd> rare · <kbd>3</kbd> legendary · assigning jumps to next ungraded · auto-saved
</div>

<div class="scrim" id="scrim">
  <div class="modal">
    <h2 id="modalTitle">Export</h2>
    <div class="body">
      <p class="hint" id="modalHint"></p>
      <textarea id="modalText" spellcheck="false"></textarea>
    </div>
    <div class="foot" id="modalFoot"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
(function(){
  "use strict";
  var TIERS = ["common","rare","legendary"];
  var KEY = "projectblock_rarities_v1";
  var items = (window.ITEMS || []).slice();
  var state = load();            // { defId: "common"|"rare"|"legendary" }
  var filter = { kind:"all", stateF:"all", lang:"both", q:"" };
  var active = 0;                // index into current filtered view
  var view = [];

  // ---- persistence ---------------------------------------------------------
  function load(){
    var raw = null;
    try { raw = localStorage.getItem(KEY); } catch(e){}
    var s = {};
    if(raw){ try { s = JSON.parse(raw).assignments || {}; } catch(e){ s = {}; } }
    // Pre-seed the game's already-legendary jokers on a truly fresh start.
    if(!raw){
      items.forEach(function(it){ if(it.legendary) s[it.defId] = "legendary"; });
    }
    return s;
  }
  function save(){
    try { localStorage.setItem(KEY, JSON.stringify(payload())); } catch(e){}
  }
  function payload(){
    return {
      version: 1,
      tiers: TIERS,
      gradedAt: new Date().toISOString(),
      assignments: state
    };
  }

  // ---- view ----------------------------------------------------------------
  function matches(it){
    if(filter.kind !== "all" && it.kind !== filter.kind) return false;
    var graded = !!state[it.defId];
    if(filter.stateF === "graded" && !graded) return false;
    if(filter.stateF === "ungraded" && graded) return false;
    if(filter.q){
      var q = filter.q.toLowerCase();
      var hay = (it.name+" "+it.defId+" "+it.en+" "+it.tr).toLowerCase();
      if(hay.indexOf(q) < 0) return false;
    }
    return true;
  }

  function render(){
    view = items.filter(matches);
    if(active >= view.length) active = view.length - 1;
    if(active < 0) active = 0;
    var list = document.getElementById("list");
    if(view.length === 0){
      list.innerHTML = '<div class="empty">Nothing matches this filter.</div>';
      updateStats(); return;
    }
    var langCls = filter.lang === "en" ? "hide-tr" : filter.lang === "tr" ? "hide-en" : "";
    var html = view.map(function(it, i){
      var r = state[it.defId] || "";
      var sell = it.sell != null ? '<span class="sell">sell '+it.sell+'</span>' : '';
      var lock = (it.legendary) ? '<span class="locknote">already legendary in-game</span>' : '';
      return ''+
      '<div class="card'+(i===active?' active':'')+(r?' g-'+r:'')+'" data-i="'+i+'" id="card-'+i+'">'+
        '<div class="info">'+
          '<div class="head">'+
            '<span class="name">'+esc(it.name)+'</span>'+
            '<span class="kind '+it.kind+'">'+it.kind+'</span>'+
            '<span class="did">'+esc(it.defId)+'</span>'+
            sell + lock +
          '</div>'+
          '<p class="desc '+langCls+'">'+
            '<span class="en">'+esc(it.en)+'</span>'+
            '<span class="tr">'+esc(it.tr)+'</span>'+
          '</p>'+
        '</div>'+
        '<div class="rate" data-did="'+esc(it.defId)+'">'+
          tierBtn("common", r, "1")+
          tierBtn("rare", r, "2")+
          tierBtn("legendary", r, "3")+
        '</div>'+
      '</div>';
    }).join("");
    list.innerHTML = html;
    updateStats();
  }

  function tierBtn(t, sel, key){
    return '<button class="'+t+(sel===t?' sel':'')+'" data-t="'+t+'">'+
      '<span>'+cap(t)+'</span><kbd>'+key+'</kbd></button>';
  }

  function updateStats(){
    var c=0,r=0,l=0,g=0;
    items.forEach(function(it){
      var v = state[it.defId];
      if(!v) return; g++;
      if(v==="common")c++; else if(v==="rare")r++; else if(v==="legendary")l++;
    });
    document.getElementById("cCommon").textContent=c;
    document.getElementById("cRare").textContent=r;
    document.getElementById("cLegend").textContent=l;
    document.getElementById("progText").textContent=g+" / "+items.length;
    document.getElementById("progFill").style.width=(items.length?(g/items.length*100):0)+"%";
  }

  // ---- actions -------------------------------------------------------------
  function assign(defId, tier){
    if(state[defId] === tier) delete state[defId]; // click the same tier to clear
    else state[defId] = tier;
    save();
  }
  function assignActiveAndAdvance(tier){
    if(!view.length) return;
    var it = view[active];
    state[it.defId] = tier;
    save();
    // jump to next ungraded within the current view, else next item
    var next = -1;
    for(var i=active+1;i<view.length;i++){ if(!state[view[i].defId]){ next=i; break; } }
    if(next<0) next = Math.min(active+1, view.length-1);
    active = next;
    render();
    scrollActive();
  }
  function move(delta){
    if(!view.length) return;
    active = Math.max(0, Math.min(view.length-1, active+delta));
    render(); scrollActive();
  }
  function scrollActive(){
    var el = document.getElementById("card-"+active);
    if(el) el.scrollIntoView({block:"nearest",behavior:"smooth"});
  }

  // ---- events --------------------------------------------------------------
  document.getElementById("list").addEventListener("click", function(e){
    var card = e.target.closest(".card"); if(!card) return;
    active = parseInt(card.getAttribute("data-i"),10);
    var btn = e.target.closest(".rate button");
    if(btn){
      var did = card.querySelector(".rate").getAttribute("data-did");
      assign(did, btn.getAttribute("data-t"));
    }
    render();
  });

  document.addEventListener("keydown", function(e){
    if(e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    if(document.getElementById("scrim").classList.contains("on")) return;
    switch(e.key){
      case "1": assignActiveAndAdvance("common"); e.preventDefault(); break;
      case "2": assignActiveAndAdvance("rare"); e.preventDefault(); break;
      case "3": assignActiveAndAdvance("legendary"); e.preventDefault(); break;
      case "j": case "ArrowDown": move(1); e.preventDefault(); break;
      case "k": case "ArrowUp": move(-1); e.preventDefault(); break;
    }
  });

  document.getElementById("search").addEventListener("input", function(e){
    filter.q = e.target.value; active = 0; render();
  });
  segHandler("segKind","k",function(v){ filter.kind=v; });
  segHandler("segState","s",function(v){ filter.stateF=v; });
  segHandler("segLang","l",function(v){ filter.lang=v; });
  function segHandler(id, attr, set){
    document.getElementById(id).addEventListener("click", function(e){
      var b = e.target.closest("button"); if(!b) return;
      [].forEach.call(this.children, function(c){ c.classList.remove("on"); });
      b.classList.add("on"); set(b.getAttribute("data-"+attr)); active=0; render();
    });
  }

  document.getElementById("btnReset").addEventListener("click", function(){
    if(!confirm("Clear ALL rarity assignments? (legendary jokers will be re-seeded)")) return;
    try{ localStorage.removeItem(KEY); }catch(e){}
    state = {}; items.forEach(function(it){ if(it.legendary) state[it.defId]="legendary"; });
    save(); render();
  });

  document.getElementById("btnExport").addEventListener("click", function(){
    var json = JSON.stringify(payload(), null, 2);
    openModal("Export — rarities.json", exportHint(), json, [
      dl("Download rarities.json", json),
      action("Copy", function(){ copy(json); }),
      action("Close", closeModal)
    ]);
  });

  document.getElementById("btnImport").addEventListener("click", function(){
    openModal("Import rarities.json", "Paste a previously exported rarities.json and Apply. This replaces current assignments.", "", [
      action("Apply", function(){
        var txt = document.getElementById("modalText").value.trim();
        if(!txt) return;
        try{
          var obj = JSON.parse(txt);
          var a = obj.assignments || obj;
          state = {};
          Object.keys(a).forEach(function(k){ if(TIERS.indexOf(a[k])>=0) state[k]=a[k]; });
          save(); closeModal(); active=0; render();
        }catch(err){ alert("Could not parse JSON: "+err.message); }
      }),
      action("Cancel", closeModal)
    ], true);
  });

  function exportHint(){
    var g=Object.keys(state).length;
    var missing = items.filter(function(it){ return !state[it.defId]; })
      .map(function(it){ return it.name; });
    var msg = g+" / "+items.length+" graded. Keyed by DefId → rarity.";
    if(missing.length) msg += "  Still ungraded: "+missing.slice(0,8).join(", ")+
      (missing.length>8?" +"+(missing.length-8)+" more":"")+".";
    return msg;
  }

  // ---- modal ---------------------------------------------------------------
  function openModal(title, hint, text, actions, editable){
    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalHint").textContent = hint;
    var ta = document.getElementById("modalText");
    ta.value = text; ta.readOnly = !editable;
    var foot = document.getElementById("modalFoot"); foot.innerHTML="";
    actions.forEach(function(a){ foot.appendChild(a); });
    document.getElementById("scrim").classList.add("on");
  }
  function closeModal(){ document.getElementById("scrim").classList.remove("on"); }
  document.getElementById("scrim").addEventListener("click", function(e){
    if(e.target === this) closeModal();
  });
  function action(label, fn){
    var b=document.createElement("button"); b.className="btn"; b.textContent=label;
    b.addEventListener("click", fn); return b;
  }
  function dl(label, text){
    var a=document.createElement("a"); a.className="btn primary"; a.textContent=label;
    a.href="data:application/json;charset=utf-8,"+encodeURIComponent(text);
    a.download="rarities.json"; return a;
  }
  function copy(text){
    var ta=document.getElementById("modalText");
    ta.readOnly=false; ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    if(navigator.clipboard){ navigator.clipboard.writeText(text).catch(function(){}); }
    ta.readOnly=true;
  }

  // ---- utils ---------------------------------------------------------------
  function esc(s){ return (s==null?"":String(s))
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
  function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

  if(!items.length){
    document.getElementById("list").innerHTML =
      '<div class="empty">data.js failed to load — re-run Tools/RarityGrader/extract.py.</div>';
  } else {
    render();
  }
})();
</script>
</body>
</html>
